<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoção 2026 | Cadastre e Ganhe</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header>
        <div class="logo">
            <img src="logo-ficticia.png" alt="Logo da Promoção">
        </div>
       
    </header>

    <section class="hero">
        <div class="banner-content">
            <h1>Sua sorte está no código!</h1>
            <p>Cadastre o código de barras e concorra a prêmios todos os dias.</p>
            <img src="premio-imagem.png" alt="Imagem do Prêmio Principal">
        </div>
    </section>

    <main>
        <section class="cadastro">
            <h2>Participe Agora</h2>
            <form id="formPromocao">
                <div class="campo">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">
                </div>

                <div class="campo">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required placeholder="exemplo@email.com">
                </div>

                <div class="campo">
                    <label for="codigo">Código de Barras:</label>
                    <input type="text" id="codigo" name="codigo" required maxlength="13" placeholder="0000000000000">
                </div>

                <button type="submit" id="btnEnviar">CADASTRAR CÓDIGO</button>
            </form>
        </section>
    </main>

    <aside id="modalSucesso" class="modal">
        <div class="modal-box">
            <h3>Cadastro Realizado!</h3>
            <p>Seu número da sorte foi gerado com sucesso.</p>
            <button onclick="fecharModal()">OK</button>
        </div>
    </aside>

    <footer>
        <section id="regulamento">
            <p>Certificado de Autorização SECAP nº 00.000/2026. Imagens meramente ilustrativas.</p>
        </section>
        <div class="redes-sociais">
            <a href="#">Instagram</a> | <a href="#">Facebook</a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
